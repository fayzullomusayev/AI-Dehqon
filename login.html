<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Dehqon | Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0b0f14;
color:white;
overflow:hidden;
}

/* animated background */

body::before{
content:"";
position:absolute;
width:800px;
height:800px;
background:radial-gradient(circle,#22c55e30,transparent 70%);
top:-250px;
left:-250px;
animation:spin 30s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* card */

.card{
position:relative;
width:380px;
padding:40px;
border-radius:18px;
background:rgba(20,25,32,0.85);
backdrop-filter:blur(12px);
border:1px solid #2a3440;
box-shadow:0 30px 80px rgba(0,0,0,0.6);
z-index:2;
}

/* logo */

.logo{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-bottom:30px;
}

.logo svg{
width:36px;
stroke:#22c55e;
}

.logo h1{
font-size:1.6rem;
}

.logo span{
color:#22c55e;
}

/* inputs */

.group{
margin-bottom:20px;
}

.input{
display:flex;
align-items:center;
background:#0f141b;
border:1px solid #2b3643;
border-radius:10px;
padding:12px;
gap:10px;
transition:0.2s;
}

.input:focus-within{
border-color:#22c55e;
box-shadow:0 0 8px #22c55e40;
}

.input svg{
width:18px;
stroke:#94a3b8;
}

input{
background:none;
border:none;
outline:none;
color:white;
width:100%;
font-size:14px;
}

/* password toggle */

.eye{
cursor:pointer;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:#0b0f14;
font-weight:700;
font-size:15px;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px #22c55e50;
}

/* loading */

.loader{
display:none;
margin-top:12px;
text-align:center;
font-size:13px;
color:#94a3b8;
}

/* error */

.error{
display:none;
margin-top:10px;
text-align:center;
font-size:13px;
color:#f87171;
}

/* footer */

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
color:#94a3b8;
}

.footer span{
color:#22c55e;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">

<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M12 2L2 7l10 5 10-5-10-5z"/>
<path d="M2 17l10 5 10-5"/>
<path d="M2 12l10 5 10-5"/>
</svg>

<h1>AI<span>Dehqon</span></h1>

</div>

<div class="group">
<div class="input">

<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="12" cy="7" r="4"/>
<path d="M5.5 21a6.5 6.5 0 0113 0"/>
</svg>

<input id="user" placeholder="Login">

</div>
</div>

<div class="group">
<div class="input">

<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<rect x="3" y="11" width="18" height="11" rx="2"/>
<path d="M7 11V7a5 5 0 0110 0v4"/>
</svg>

<input id="pass" type="password" placeholder="Parol">

<svg class="eye" onclick="togglePass()" viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
<circle cx="12" cy="12" r="3"/>
</svg>

</div>
</div>

<button onclick="login()">Kirish</button>

<div class="loader" id="loader">
Tizimga kirilmoqda...
</div>

<div class="error" id="error">
Login yoki parol noto‘g‘ri
</div>

<div class="footer">
AI Dehqon • <span>Agro Intelligence Platform</span>
</div>

</div>

<script>

function togglePass(){

let p=document.getElementById("pass")

if(p.type==="password"){
p.type="text"
}else{
p.type="password"
}

}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

document.getElementById("loader").style.display="block"

setTimeout(()=>{

if(u==="fayzullo" && p==="ai0008"){

sessionStorage.setItem("auth","true")

window.location.href="index.html"

}else{

document.getElementById("loader").style.display="none"
document.getElementById("error").style.display="block"

}

},800)

}

</script>

</body>
</html>
